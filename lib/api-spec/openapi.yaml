openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ai
    description: AI generation operations (story, prompts, music, voiceover)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /generate-story:
    post:
      operationId: generateStory
      tags: [ai]
      summary: Generate a structured story from a brief
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoryRequest"
      responses:
        "200":
          description: Generated story
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /continue-story:
    post:
      operationId: continueStory
      tags: [ai]
      summary: Continue an existing story with new acts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContinueStoryRequest"
      responses:
        "200":
          description: Continued story
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /generate-video-prompts:
    post:
      operationId: generateVideoPrompts
      tags: [ai]
      summary: Generate Seedance 2.0 video prompts for one part of the video
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoPromptsRequest"
      responses:
        "200":
          description: Generated video part
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoPromptsResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /generate-music-brief:
    post:
      operationId: generateMusicBrief
      tags: [ai]
      summary: Generate a Suno/Udio music brief for the project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MusicBriefRequest"
      responses:
        "200":
          description: Generated music brief
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MusicBriefResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /generate-voiceover:
    post:
      operationId: generateVoiceover
      tags: [ai]
      summary: Generate a voiceover script in English, Hindi, or Hinglish for one video part
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoiceoverRequest"
      responses:
        "200":
          description: Generated voiceover
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceoverResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    StoryAct:
      type: object
      properties:
        actNumber:
          type: integer
        title:
          type: string
        description:
          type: string
        keyMoment:
          type: string
      required:
        - actNumber
        - title
        - description
        - keyMoment
    StoryCharacter:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
      required:
        - name
        - description
    StoryResponse:
      type: object
      properties:
        title:
          type: string
        synopsis:
          type: string
        acts:
          type: array
          items:
            $ref: "#/components/schemas/StoryAct"
        characters:
          type: array
          items:
            $ref: "#/components/schemas/StoryCharacter"
        mood:
          type: string
        colorPalette:
          type: array
          items:
            type: string
          description: List of hex color strings, e.g. ["#1a1a1a", "#E8FF47"]
        musicSuggestion:
          type: string
      required:
        - title
        - synopsis
        - acts
        - characters
        - mood
        - colorPalette
        - musicSuggestion
    StoryRequest:
      type: object
      properties:
        brief:
          type: string
        genre:
          type: string
        duration:
          type: number
          description: Total target duration in seconds (kept for backward compatibility, equivalent to totalDurationSeconds)
        totalDurationSeconds:
          type: number
          description: Total target duration in seconds
        partsCount:
          type: integer
          description: Number of 15-second video parts (Math.ceil(totalDurationSeconds/15))
        style:
          type: string
          description: Visual style name, e.g. "Live Action Cinematic"
        voiceoverLanguage:
          type: string
          description: '"none" | "english" | "hindi" | "hinglish"'
      required:
        - brief
        - genre
        - duration
    ContinueStoryRequest:
      type: object
      properties:
        existingStory:
          $ref: "#/components/schemas/StoryResponse"
        direction:
          type: string
      required:
        - existingStory
        - direction

    VideoShot:
      type: object
      properties:
        shotNumber:
          type: integer
        timestamp:
          type: string
          description: e.g. "00:00-00:03"
        name:
          type: string
        effects:
          type: array
          items:
            type: string
        description:
          type: string
        cameraWork:
          type: string
        speed:
          type: string
        transition:
          type: string
        isSignature:
          type: boolean
      required:
        - shotNumber
        - timestamp
        - name
        - effects
        - description
        - cameraWork
        - speed
        - transition
        - isSignature
    VideoEffectInventoryItem:
      type: object
      properties:
        name:
          type: string
        usedCount:
          type: integer
        shots:
          type: array
          items:
            type: integer
        role:
          type: string
      required:
        - name
        - usedCount
        - shots
        - role
    VideoDensityBlock:
      type: object
      properties:
        timeRange:
          type: string
        density:
          type: string
          description: "HIGH | MEDIUM | LOW"
        effects:
          type: array
          items:
            type: string
        count:
          type: integer
        duration:
          type: string
      required:
        - timeRange
        - density
        - effects
        - count
        - duration
    VideoEnergyArc:
      type: object
      properties:
        act1:
          type: string
        act2:
          type: string
        act3:
          type: string
      required:
        - act1
        - act2
        - act3
    VideoAudioSummary:
      type: object
      properties:
        voiceoverIncluded:
          type: boolean
        bgmIncluded:
          type: boolean
        keySyncPoints:
          type: array
          items:
            type: string
      required:
        - voiceoverIncluded
        - bgmIncluded
        - keySyncPoints
    VideoPromptsResponse:
      type: object
      properties:
        shots:
          type: array
          items:
            $ref: "#/components/schemas/VideoShot"
        effectsInventory:
          type: array
          items:
            $ref: "#/components/schemas/VideoEffectInventoryItem"
        densityMap:
          type: array
          items:
            $ref: "#/components/schemas/VideoDensityBlock"
        energyArc:
          $ref: "#/components/schemas/VideoEnergyArc"
        lastFrameDescription:
          type: string
        copyablePrompt:
          type: string
        autoVoiceoverScript:
          type: string
          nullable: true
          description: VO script written by the model when voiceoverLanguage was set in the request
        audioSummary:
          $ref: "#/components/schemas/VideoAudioSummary"
      required:
        - shots
        - effectsInventory
        - densityMap
        - energyArc
        - lastFrameDescription
        - copyablePrompt
    VideoPromptsRequest:
      type: object
      properties:
        story:
          $ref: "#/components/schemas/StoryResponse"
        style:
          type: string
        duration:
          type: number
          description: Duration of this single part in seconds
        part:
          type: integer
        totalParts:
          type: integer
        previousLastFrame:
          type: string
          description: lastFrameDescription from the previous part for continuation
        voiceoverLanguage:
          type: string
          nullable: true
          description: '"english" | "hindi" | "hinglish" — when set, Claude auto-writes a part-specific VO'
        voiceoverTone:
          type: string
          nullable: true
        voiceoverScript:
          type: string
          nullable: true
          description: Optional pre-written script for this part. If absent and voiceoverLanguage is set, the model writes one.
        bgmStyle:
          type: string
          nullable: true
        bgmTempo:
          type: string
          nullable: true
        bgmInstruments:
          type: array
          items:
            type: string
      required:
        - story
        - style
        - duration
        - part
        - totalParts

    MusicPartDirection:
      type: object
      properties:
        part:
          type: integer
        musicDirection:
          type: string
      required:
        - part
        - musicDirection
    MusicBriefResponse:
      type: object
      properties:
        genre:
          type: string
        subGenre:
          type: string
        tempo:
          type: string
        energy:
          type: string
          description: "low | medium | high | explosive"
        instruments:
          type: array
          items:
            type: string
        mood:
          type: string
        vocalStyle:
          type: string
          nullable: true
        referenceArtists:
          type: array
          items:
            type: string
        sunoPrompt:
          type: string
        udioPrompt:
          type: string
        timingNotes:
          type: string
        partBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/MusicPartDirection"
      required:
        - genre
        - subGenre
        - tempo
        - energy
        - instruments
        - mood
        - referenceArtists
        - sunoPrompt
        - udioPrompt
        - timingNotes
        - partBreakdown
    MusicBriefRequest:
      type: object
      properties:
        story:
          $ref: "#/components/schemas/StoryResponse"
        style:
          type: string
        mood:
          type: string
        duration:
          type: number
        language:
          type: string
        energyLevel:
          type: integer
          description: 1-10 scale
        tempo:
          type: string
          description: "slow | medium | fast | very_fast"
        totalParts:
          type: integer
      required:
        - story
        - style
        - mood
        - duration
        - language

    VoiceoverAlternateVersion:
      type: object
      properties:
        label:
          type: string
        script:
          type: string
      required:
        - label
        - script
    VoiceoverResponse:
      type: object
      properties:
        language:
          type: string
          description: "english | hindi | hinglish"
        script:
          type: string
        wordCount:
          type: integer
        estimatedDuration:
          type: string
        tone:
          type: string
        deliveryNotes:
          type: string
        emphasisWords:
          type: array
          items:
            type: string
        alternateVersions:
          type: array
          items:
            $ref: "#/components/schemas/VoiceoverAlternateVersion"
        elevenlabsPrompt:
          type: string
        copyableScript:
          type: string
      required:
        - language
        - script
        - wordCount
        - estimatedDuration
        - tone
        - deliveryNotes
        - emphasisWords
        - alternateVersions
        - elevenlabsPrompt
        - copyableScript
    VoiceoverRequest:
      type: object
      properties:
        story:
          $ref: "#/components/schemas/StoryResponse"
        style:
          type: string
        language:
          type: string
        tone:
          type: string
        duration:
          type: number
        part:
          type: integer
        pace:
          type: string
          description: "slow | normal | fast"
      required:
        - story
        - language
        - tone
        - duration
        - part
