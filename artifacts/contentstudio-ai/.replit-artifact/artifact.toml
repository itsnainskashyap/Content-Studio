kind = "web"
previewPath = "/"
title = "ContentStudio AI"
version = "1.0.0"
id = "artifacts/contentstudio-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20654

[services.development]
run = "pnpm --filter @workspace/contentstudio-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/contentstudio-ai", "run", "build" ]
publicDir = "artifacts/contentstudio-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20654"
BASE_PATH = "/"
